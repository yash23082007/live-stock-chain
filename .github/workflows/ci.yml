name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: farmfinance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/farmfinance_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-key-at-least-32-characters
      ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run Linting (Workspace Boundaries)
        run: npm run lint

      - name: Typecheck 
        run: npm run typecheck

      - name: Build Platform
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Slither (Contract Security Audit)
        uses: crytic/slither-action@v0.4.0
        with:
          target: './apps/livestock'
          slither-args: '--fail-high'
        continue-on-error: true # Allow CI to pass while we refine initial findings
