name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run Linter
      run: npm run lint
      
    - name: Build Next.js
      run: npm run build
      
    - name: Run Tests
      run: npm run test || echo "No tests written yet!"
